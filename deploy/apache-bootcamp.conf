# iOS Bootcamp — Apache reverse-proxy rules for the /bootcamp sub-path.
# Add these lines INSIDE the existing <VirtualHost *:443> block for iosdc.geu.ac.in
# (/etc/apache2/sites-enabled/iosdc-le-ssl.conf). That vhost already sets
# `ProxyPreserveHost On` and `SSLProxyEngine On`.
#
# Ports: 4100 (API) and 3100 (Next.js) — chosen to avoid the existing iosform app on 3000/4000.
# Order matters: the /bootcamp/api/ rule MUST appear before the /bootcamp rule.

    # ================= iOS Bootcamp =================
    ProxyPass        /bootcamp/api/ http://127.0.0.1:4100/api/
    ProxyPassReverse /bootcamp/api/ http://127.0.0.1:4100/api/

    ProxyPass        /bootcamp http://127.0.0.1:3100/bootcamp
    ProxyPassReverse /bootcamp http://127.0.0.1:3100/bootcamp
