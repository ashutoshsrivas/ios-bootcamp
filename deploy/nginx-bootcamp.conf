# iOS Bootcamp — reverse-proxy rules for the /bootcamp sub-path.
# Paste these two location blocks INSIDE the existing `server { ... }` block that
# serves https://iosdc.geu.ac.in (the one listening on 443 with your TLS certs).
#
# Order matters: the more specific /bootcamp/api/ block must come before /bootcamp.

    # --- Backend API (Express on :4000) ---
    # /bootcamp/api/<x>  ->  http://127.0.0.1:4000/api/<x>   (the /bootcamp/api/ prefix is stripped)
    location /bootcamp/api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 30m;          # allow file/roster uploads (25MB limit in app)
    }

    # --- Frontend (Next.js on :3000, built with basePath=/bootcamp) ---
    # /bootcamp and /bootcamp/<x>  ->  http://127.0.0.1:3000  (URI preserved, incl. /bootcamp/_next/*)
    location /bootcamp {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
